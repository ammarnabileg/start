<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة الخريجين الجدد</title>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Alexandria', sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
    header { background-color: #0077b6; color: white; padding: 1rem; text-align: center; }
    .container { max-width: 800px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; }
    input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 5px; }
    button { background-color: #0077b6; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 5px; cursor: pointer; }
    button:hover { background-color: #005f87; }
  </style>
</head>
<body>
  <header><h1>منصة الخريجين الجدد</h1></header>
  <div class="container">
    <h2>تسجيل بيانات الخريج</h2>
    <form action="save_cv.php" method="POST">
      <div class="form-group"><label>الاسم الكامل:</label><input type="text" name="name" required></div>
      <div class="form-group"><label>البريد الإلكتروني:</label><input type="email" name="email" required></div>
      <div class="form-group"><label>رقم الهاتف:</label><input type="text" name="phone" required></div>
      <div class="form-group"><label>الكلية / التخصص:</label><input type="text" name="major" required></div>
      <div class="form-group"><label>المهارات:</label><textarea name="skills" rows="4" required></textarea></div>
      <div class="form-group"><label>الخبرات إن وجدت:</label><textarea name="experience" rows="4"></textarea></div>
      <button type="submit">إنشاء السيرة الذاتية</button>
    </form>
  </div>
</body>
</html>
