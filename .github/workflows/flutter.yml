name: Flutter CI (loyalty-platform)

# يشغّل التحليل والاختبارات تلقائيًا على كل push/PR يمسّ مجلد المنصة.
on:
  push:
    paths:
      - 'loyalty-platform/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'loyalty-platform/**'
      - '.github/workflows/flutter.yml'

defaults:
  run:
    working-directory: loyalty-platform

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: loyalty_core — pub get
        working-directory: loyalty-platform/packages/loyalty_core
        run: flutter pub get

      - name: loyalty_core — analyze
        working-directory: loyalty-platform/packages/loyalty_core
        run: flutter analyze

      - name: loyalty_core — test (QR TOTP + points logic)
        working-directory: loyalty-platform/packages/loyalty_core
        run: flutter test

      - name: customer_app — pub get
        working-directory: loyalty-platform/apps/customer_app
        run: flutter pub get

      - name: customer_app — analyze
        working-directory: loyalty-platform/apps/customer_app
        run: flutter analyze

      - name: merchant_app — pub get
        working-directory: loyalty-platform/apps/merchant_app
        run: flutter pub get

      - name: merchant_app — analyze
        working-directory: loyalty-platform/apps/merchant_app
        run: flutter analyze

  build-apk:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      # ملاحظة: الـ build يحتاج google-services.json (Firebase). في الـ CI
      # مرّره عبر Secret أو placeholder. هنا نبني تطبيق العميل كمثال.
      - name: customer_app — build debug APK
        working-directory: loyalty-platform/apps/customer_app
        run: |
          flutter pub get
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
