name: loyalty_core
description: Shared design system, models, widgets, config & QR logic for the loyalty platform apps.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  crypto: ^3.0.5            # HMAC for rotating QR token
  intl: ^0.19.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
