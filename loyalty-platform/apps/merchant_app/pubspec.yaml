name: merchant_app
description: تطبيق التاجر — منصة الولاء (Hatchy style).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  loyalty_core:
    path: ../../packages/loyalty_core

  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5
  firebase_crashlytics: ^4.1.5

  # خاص بالتاجر
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  fl_chart: ^0.69.2
  flutter_secure_storage: ^9.2.2
  intl: any
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
