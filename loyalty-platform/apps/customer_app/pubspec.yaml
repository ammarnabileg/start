name: customer_app
description: تطبيق العميل — منصة الولاء (Hatchy style).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  loyalty_core:
    path: ../../packages/loyalty_core

  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5
  firebase_crashlytics: ^4.1.5
  flutter_local_notifications: ^17.2.4

  # خاص بالعميل
  qr_flutter: ^4.1.0
  screen_brightness: ^1.0.1
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^9.2.2
  share_plus: ^10.1.2
  url_launcher: ^6.3.1
  intl: any
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/mascot/
